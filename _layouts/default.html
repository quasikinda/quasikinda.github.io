<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Adam Roth</title>
  <meta name="description" content="Adam Roth — Artist &amp; Illustrator, Los Angeles">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

<div class="site-wrapper">
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <img src="{{ '/images/logo.jpg' | relative_url }}" style="max-width: 96px; height: auto" alt="Adam Roth">
      </a>
      <br>
      <nav class="navbar">
        <a class="nav-btn" href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Drawings</a>
        <a class="nav-btn" href="{{ '/filmtv/' | relative_url }}" {% if page.url contains 'filmtv' %}class="active"{% endif %}>Film / TV Work</a>
        <a class="nav-btn" href="{{ '/media-video/' | relative_url }}" {% if page.url contains 'media-video' %}class="active"{% endif %}>Media / Video</a>
        <a class="nav-btn" href="{{ '/othercommissions/' | relative_url }}" {% if page.url contains 'othercommissions' %}class="active"{% endif %}>Other Commissions</a>
        <a class="nav-btn" href="{{ '/pet-portraits/' | relative_url }}" {% if page.url contains 'pet-portraits' %}class="active"{% endif %}>Pet Portraits</a>
        <a class="nav-btn" href="mailto:adroth@gmail.com">adroth@gmail.com</a>
        <a class="nav-btn" href="https://instagram.com/addyroth" target="_blank">Instagram</a>
      </nav>
    </div>
  </header>

  <main id="page">
    {{ content }}
  </main>
</div>

</body>
</html>
